name: Migrace obsahu do Sanity

on:
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Spustit migraci
        env:
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
        run: node migrate-sanity/migrate.js
